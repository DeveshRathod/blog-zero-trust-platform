apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blog-posts
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: zero-trust-platform
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: blog-platform
  source:
    repoURL: https://github.com/DeveshRathod/blog-zero-trust-platform
    targetRevision: main
    path: apps/posts
  destination:
    server: https://kubernetes.default.svc
    namespace: zt-posts
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
