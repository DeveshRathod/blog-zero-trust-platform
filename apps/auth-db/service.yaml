apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: zt-auth-db
  labels:
    app: auth-db
spec:
  selector:
    app: auth-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
# Headless service — gives each StatefulSet pod a stable DNS entry
# (auth-db-0.auth-db-headless.zt-auth-db.svc.cluster.local)
apiVersion: v1
kind: Service
metadata:
  name: auth-db-headless
  namespace: zt-auth-db
  labels:
    app: auth-db
spec:
  clusterIP: None
  selector:
    app: auth-db
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
