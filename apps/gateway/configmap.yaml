apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: zt-gateway
data:
  PORT: "8080"
  SERVICE_NAME: "api-gateway"
  # Cross-namespace FQDNs — required since each service lives in its own namespace.
  # ztunnel intercepts and mTLS-encrypts all of this traffic automatically.
  AUTH_SERVICE_URL: "http://auth-service.zt-auth.svc.cluster.local:4001"
  BLOG_SERVICE_URL: "http://blog-service.zt-posts.svc.cluster.local:4002"
  CORS_ORIGIN: "*"
  RATE_LIMIT_PER_MINUTE: "120"
  SEED_DEMO_DATA: "true"
  FRONTEND_URL: "http://localhost"
