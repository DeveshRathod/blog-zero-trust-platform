apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-to-posts
  namespace: zt-posts
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/zt-posts/sa/waypoint"

---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-posts-waypoint
  namespace: zt-posts
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: waypoint
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - zt-gateway
