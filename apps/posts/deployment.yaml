apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-service
  namespace: zt-posts
  labels:
    app: blog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-service
  template:
    metadata:
      labels:
        app: blog-service
    spec:
      serviceAccountName: blog-service
      initContainers:
        - name: wait-for-posts-db
          image: mongo:7
          command:
            - sh
            - -c
            - |
              until mongosh --host posts-db.zt-posts-db.svc.cluster.local \
                --eval "db.adminCommand('ping')" --quiet 2>/dev/null; do
                echo "waiting for posts-db...";
                sleep 3;
              done;
              echo "posts-db ready"
      containers:
        - name: blog-service
          image: devesh11411/blog-posts:v1.0.0
          ports:
            - containerPort: 4002
          envFrom:
            - configMapRef:
                name: blog-service-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: blog-posts-secrets
                  key: JWT_SECRET
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: blog-posts-secrets
                  key: INTERNAL_API_KEY
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4002
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 4002
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
